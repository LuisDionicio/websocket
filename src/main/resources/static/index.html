<!DOCTYPE html>
<html>
<head>
    <title>Chat Sistemas</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.5.0/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
</head>
<body class="container mt-5">
<div class="card">
    <div class="card-header">Chat en Tiempo Real (WebSocket)</div>
    <div id="chat-box" class="card-body" style="height: 300px; overflow-y: scroll; border: 1px solid #ccc;">
        <!-- Los mensajes aparecerán aquí -->
    </div>
    <div class="card-footer">
        <input type="text" id="usuario" class="form-control mb-2" placeholder="Tu nombre">
        <div class="input-group">
            <input type="text" id="mensaje" class="form-control" placeholder="Escribe un mensaje...">
            <button class="btn btn-primary" onclick="enviar()">Enviar</button>
        </div>
    </div>
</div>

<script>
    var stompClient = null;

    // Conectar al WebSocket configurado en Java
    var socket = new SockJS('/ws-chat');
    stompClient = Stomp.over(socket);
    stompClient.connect({}, function (frame) {
        console.log('Conectado: ' + frame);
        stompClient.subscribe('/topic/publico', function (msg) {
            mostrarMensaje(JSON.parse(msg.body));
        });
    });

    function enviar() {
        var usr = document.getElementById('usuario').value;
        var content = document.getElementById('mensaje').value;
        stompClient.send("/app/mensaje", {}, JSON.stringify({'usuario': usr, 'contenido': content}));
        document.getElementById('mensaje').value = '';
    }

    function mostrarMensaje(m) {
        var div = document.createElement('div');
        div.innerHTML = "<strong>" + m.usuario + ":</strong> " + m.contenido;
        document.getElementById('chat-box').appendChild(div);
    }
</script>
</body>
</html>
